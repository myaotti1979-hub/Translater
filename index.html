<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0f172a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MeetTranslate">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<title>Meeting Translator</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;800&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;background:#0f172a;color:#ffffff;font-family:'Noto Sans JP','Segoe UI',sans-serif;-webkit-tap-highlight-color:transparent}

  @keyframes ripple{0%{transform:scale(.8);opacity:.6}100%{transform:scale(2.8);opacity:0}}
  @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  @keyframes livePulse{0%,100%{opacity:1}50%{opacity:.3}}

  /* Top bar */
  .top-bar{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid rgba(99,102,241,0.15)}
  .top-bar h1{font-size:14px;font-weight:700;color:#ffffff}
  .top-bar button{background:none;border:1px solid rgba(99,102,241,0.25);color:#ffffff;font-size:18px;width:34px;height:34px;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center}

  /* Settings */
  .settings{display:none;padding:12px 16px;background:rgba(30,41,59,0.9);border-bottom:1px solid rgba(99,102,241,0.15)}
  .settings.show{display:block}
  .settings label{display:block;font-size:11px;font-weight:600;color:#ffffff;margin-bottom:3px;margin-top:10px}
  .settings label:first-child{margin-top:0}
  .settings input,.settings textarea{width:100%;padding:8px 10px;border-radius:8px;border:1px solid rgba(99,102,241,0.25);background:rgba(15,23,42,0.8);color:#ffffff;font-size:13px;font-family:inherit}
  .settings input:focus,.settings textarea:focus{outline:none;border-color:#818cf8}
  .settings textarea{height:40px;resize:none}
  .key-status{font-size:10px;margin-top:3px}
  .key-ok{color:#86efac}.key-ng{color:#fca5a5}
  .src-row{display:flex;gap:6px;margin-top:10px}
  .src-btn{flex:1;padding:7px;border-radius:8px;border:1px solid rgba(99,102,241,0.2);background:rgba(30,41,59,0.5);color:#ffffff;font-size:11px;font-weight:600;cursor:pointer;text-align:center;font-family:inherit}
  .src-btn.active{background:rgba(99,102,241,0.2);border-color:#818cf8;color:#ffffff}

  /* Controls */
  .ctrl{display:flex;align-items:center;justify-content:center;gap:12px;padding:10px 16px}
  .rec-btn{width:52px;height:52px;border-radius:50%;border:none;cursor:pointer;background:linear-gradient(135deg,#6366f1,#818cf8);color:#fff;font-size:20px;display:flex;align-items:center;justify-content:center;box-shadow:0 0 20px rgba(99,102,241,0.4);transition:all .3s;position:relative}
  .rec-btn.on{background:linear-gradient(135deg,#dc2626,#f43f5e);box-shadow:0 0 28px rgba(244,63,94,0.5)}
  .rec-btn .rr{position:absolute;inset:-4px;border-radius:50%;border:2px solid rgba(244,63,94,0.4);animation:ripple 1.5s ease-out infinite;display:none}
  .rec-btn .rr:nth-child(2){animation-delay:.5s;border-color:rgba(244,63,94,0.3)}
  .rec-btn.on .rr{display:block}
  .ctrl-status{font-size:11px;color:#ffffff;font-weight:600}
  .ctrl-status.on{color:#f43f5e}

  .error-box{margin:0 16px 4px;padding:8px 12px;border-radius:8px;background:rgba(239,68,68,0.15);border:1px solid rgba(239,68,68,0.3);color:#fca5a5;font-size:12px;text-align:center;display:none}
  .error-box.show{display:block}

  /* Floating rec button */
  .float-rec{position:fixed;bottom:20px;right:20px;z-index:50;width:52px;height:52px;border-radius:50%;border:none;cursor:pointer;background:linear-gradient(135deg,#6366f1,#818cf8);color:#fff;font-size:20px;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 12px rgba(99,102,241,0.5);transition:all .3s}
  .float-rec.on{background:linear-gradient(135deg,#dc2626,#f43f5e);box-shadow:0 2px 16px rgba(244,63,94,0.6)}

  /* Feed */
  .feed{flex:1;overflow-y:auto;padding:8px 16px 80px;display:flex;flex-direction:column;gap:10px}
  .feed-empty{text-align:center;color:#ffffff;margin-top:40px;font-size:14px;line-height:2}

  /* Block */
  .block{background:rgba(30,41,59,0.6);border-radius:14px;padding:14px 16px;animation:fadeUp .25s ease-out;border:1px solid rgba(99,102,241,0.1)}
  .block.live{border-color:rgba(99,102,241,0.3);background:rgba(30,41,59,0.8)}
  .block-head{display:flex;align-items:center;gap:6px;margin-bottom:6px}
  .block-src{font-size:8px;font-weight:700;padding:2px 6px;border-radius:4px;color:#ffffff;background:rgba(100,116,139,0.15)}
  .block-live{font-size:8px;font-weight:700;padding:2px 6px;border-radius:4px;color:#f43f5e;background:rgba(244,63,94,0.15);animation:livePulse 1.2s infinite}
  .block-time{font-size:9px;color:#ffffff;margin-left:auto}

  /* Japanese translation - the star */
  .block-ja{font-size:18px;line-height:1.7;color:#ffffff;font-weight:700;margin-bottom:6px;min-height:24px}
  .block-ja.waiting{font-size:13px;color:#818cf8;font-weight:400}

  /* English original - supporting role */
  .block-en{font-size:12px;line-height:1.5;color:#ffffff;border-top:1px solid rgba(99,102,241,0.1);padding-top:6px}

  /* Scroll anchor */
  .scroll-anchor{height:1px;flex-shrink:0}

  /* Summary overlay */
  .summary-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:100;justify-content:center;align-items:center;padding:16px}
  .summary-overlay.show{display:flex}
  .summary-box{background:#1e293b;border-radius:16px;padding:20px;max-width:600px;width:100%;max-height:80vh;overflow-y:auto;border:1px solid rgba(99,102,241,0.3)}
  .summary-box h2{font-size:16px;color:#ffffff;margin-bottom:12px}
  .summary-box pre{white-space:pre-wrap;font-size:14px;line-height:1.8;color:#ffffff;font-family:'Noto Sans JP',sans-serif}
  .summary-box .btn-row{display:flex;gap:8px;margin-top:16px}
  .summary-box button{flex:1;padding:10px;border-radius:8px;border:none;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
  .summary-close{background:rgba(99,102,241,0.2);color:#ffffff}
  .summary-word{background:rgba(34,197,94,0.2);color:#86efac}
</style>
</head>
<body>
<div id="app">
  <!-- Floating start/stop button -->
  <button class="float-rec" id="floatRec" onclick="toggle()">🎤</button>

  <!-- Top bar -->
  <div class="top-bar">
    <h1>🌐 Meeting Translator</h1>
    <span style="font-size:12px;color:#ffffff;margin-left:8px">v2026-04-27n</span>
    <div style="display:flex;gap:6px">
      <button onclick="saveTranscript()" title="トランスクリプト保存">💾</button>
      <button onclick="document.getElementById('loadFile').click()" title="トランスクリプト読込→要約">📂</button>
      <button onclick="exportWord()" title="Word保存">📝</button>
      <button onclick="openSummary()" title="AI要約">📋</button>
      <button onclick="clearAll()" title="クリア">🗑</button>
      <button onclick="toggleSettings()" title="設定">⚙</button>
    </div>
  </div>

  <!-- Settings -->
  <div class="settings" id="settings">
    <label>認識エンジン</label>
    <div class="src-row">
      <button class="src-btn active" id="btnEngGroq" onclick="setEngine('groq')">⚡ Groq+Gemini</button>
      <button class="src-btn" id="btnEngGem" onclick="setEngine('gemini')">🔷 全部Gemini</button>
      <button class="src-btn" id="btnEng1step" onclick="setEngine('1step')">🚀 1step</button>
    </div>
    <div style="font-size:10px;color:#ffffff;margin-top:4px" id="engineDesc">音声認識=Groq Whisper（無料）/ 翻訳・要約=Gemini Flash</div>

    <label>Gemini モデル</label>
    <div class="src-row">
      <button class="src-btn active" id="btnM1" onclick="setModel('gemini-3-flash-preview')">3 Flash<br><span style="font-size:9px;color:#86efac">⭐最高品質</span></button>
      <button class="src-btn" id="btnM2" onclick="setModel('gemini-2.5-flash')">2.5 Flash<br><span style="font-size:9px;color:#ffffff">安定</span></button>
      <button class="src-btn" id="btnM3" onclick="setModel('gemini-2.5-flash-lite')">2.5 Lite<br><span style="font-size:9px;color:#fbbf24">最安</span></button>
    </div>
    <div style="font-size:10px;color:#ffffff;margin-top:4px" id="modelDesc">Gemini 3 Flash Preview — 最高品質・$0.50/$3.00 (音声$1.00) per 1M tokens</div>

    <label>Groq API キー（<a href="https://console.groq.com" target="_blank" style="color:#818cf8">無料取得</a>）</label>
    <input type="password" id="keyInput" placeholder="gsk_..." oninput="saveKey()">
    <div class="key-status" id="keyStatus"></div>

    <label>Gemini API キー（<a href="https://aistudio.google.com/apikey" target="_blank" style="color:#818cf8">取得</a>）</label>
    <input type="password" id="gemKeyInput" placeholder="AIza..." oninput="saveGemKey()">
    <div class="key-status" id="gemKeyStatus"></div>

    <label>参加者の名前（人名認識ヒント）</label>
    <textarea id="namesInput" placeholder="田中, Smith, 佐藤..." oninput="saveNames()"></textarea>

    <label>音声ソース</label>
    <div class="src-row">
      <button class="src-btn active" id="btnMic" onclick="toggleSrc('mic')">🎙 マイク</button>
      <button class="src-btn" id="btnPC" onclick="toggleSrc('pc')">🖥 PC音声（Zoom等）</button>
    </div>
  </div>

  <!-- Controls -->
  <div class="ctrl">
    <button class="rec-btn" id="recBtn" onclick="toggle()">
      <span class="rr"></span><span class="rr"></span>
      <span id="recIcon">🎤</span>
    </button>
    <span class="ctrl-status" id="ctrlStatus">タップして開始</span>
  </div>
  <div class="error-box" id="errBox"></div>

  <!-- Translation Mode -->
  <div style="display:flex;gap:6px;padding:4px 16px 6px;justify-content:center;flex-wrap:wrap">
    <button class="src-btn active" id="btnModeAuto" onclick="setTransMode('auto')" style="padding:5px 10px;font-size:11px">🔄 自動</button>
    <button class="src-btn" id="btnModeEnJa" onclick="setTransMode('en-ja')" style="padding:5px 10px;font-size:11px">🇺🇸→🇯🇵</button>
    <button class="src-btn" id="btnModeJaEn" onclick="setTransMode('ja-en')" style="padding:5px 10px;font-size:11px">🇯🇵→🇺🇸</button>
    <button class="src-btn" id="btnModeJaOnly" onclick="setTransMode('ja-only')" style="padding:5px 10px;font-size:11px">🇯🇵 議事録</button>
  </div>

  <!-- Feed -->
  <div class="feed" id="feed">
    <div class="feed-empty" id="feedEmpty">🎙 開始すると翻訳がここに表示されます</div>
  </div>
  <div class="scroll-anchor" id="scrollAnchor"></div>
  <input type="file" id="loadFile" accept=".json" style="display:none" onchange="loadTranscript(event)">

  <!-- Summary Modal -->
  <div class="summary-overlay" id="summaryOverlay" onclick="if(event.target===this)closeSummary()">
    <div class="summary-box">
      <div class="src-row" style="margin-bottom:12px">
        <button class="src-btn active" id="btnSumAll" onclick="summarize('all')">📋 全体要約</button>
        <button class="src-btn" id="btnSumBlk" onclick="summarize('blocks')">💬 発言要約</button>
      </div>
      <pre id="summaryText">モードを選んでください</pre>
      <div class="btn-row">
        <button class="summary-word" onclick="exportWord(true)">📝 要約付きWord保存</button>
        <button class="summary-close" onclick="closeSummary()">閉じる</button>
      </div>
    </div>
  </div>
</div>

<script>
// ══════ State ══════
let apiKey = '', geminiKey = '', nameHints = '', useMic = true, usePC = false;
let sttEngine = 'groq'; // 'groq' or 'gemini'
let geminiModel = 'gemini-3-flash-preview';
let transMode = 'auto'; // 'auto', 'en-ja', 'ja-en', 'ja-only'
let isOn = false;
let micStream = null, pcStream = null;
let micTimer = null, pcTimer = null;

// Per-source block state
const src = {
  mic: { el: null, lastText: '', accText: '', accJa: '', transVer: 0, context: [], silentCount: 0, sealTimer: null },
  pc:  { el: null, lastText: '', accText: '', accJa: '', transVer: 0, context: [], silentCount: 0, sealTimer: null }
};

const CHUNK_SEC = 5;
const CHUNK_MS = CHUNK_SEC * 1000;
const CHUNK_SEC_FAST = 5; // 議事録モードも5秒（認識精度優先）
const CHUNK_MS_FAST = CHUNK_SEC_FAST * 1000;
const SEAL_SILENCE = 1;     // seal after 1 silent chunk (5 seconds)

// Transcript log
let transcript = [];

// ══════ Storage ══════
function sG(k){try{return localStorage.getItem(k)}catch{return null}}
function sS(k,v){try{localStorage.setItem(k,v)}catch{}}

// ══════ Model config (must be before init) ══════
const MODEL_INFO={
  'gemini-3-flash-preview':{btn:'btnM1',desc:'Gemini 3 Flash Preview — 最高品質・$0.50/$3.00 (音声$1.00) per 1M tokens'},
  'gemini-2.5-flash':{btn:'btnM2',desc:'Gemini 2.5 Flash — 安定・$0.30/$2.50 (音声$1.00) per 1M tokens'},
  'gemini-2.5-flash-lite':{btn:'btnM3',desc:'Gemini 2.5 Flash-Lite — 最安・$0.10/$0.40 (音声$0.30) per 1M tokens'}
};

// ══════ Settings functions (must be before init) ══════
function toggleSettings(){document.getElementById('settings').classList.toggle('show')}
function saveKey(){apiKey=document.getElementById('keyInput').value.trim();sS('gk',apiKey);updateKeyUI()}
function saveNames(){nameHints=document.getElementById('namesInput').value;sS('nh',nameHints)}
function updateKeyUI(){
  const el=document.getElementById('keyStatus');
  if(!apiKey)el.innerHTML='<span class="key-ng">⚠ APIキーを入力してください</span>';
  else if(apiKey.startsWith('gsk_'))el.innerHTML='<span class="key-ok">✓ 設定済み</span>';
  else el.innerHTML='<span class="key-ng">⚠ gsk_ で始まるキーを入力</span>';
}
function toggleSrc(s){
  if(s==='mic'){useMic=!useMic;document.getElementById('btnMic').classList.toggle('active',useMic)}
  if(s==='pc'){usePC=!usePC;document.getElementById('btnPC').classList.toggle('active',usePC)}
}
function saveGemKey(){geminiKey=document.getElementById('gemKeyInput').value.trim();sS('gemk',geminiKey);updateGemKeyUI()}
function updateGemKeyUI(){
  const el=document.getElementById('gemKeyStatus');
  if(!geminiKey)el.innerHTML='<span class="key-ng">⚠ APIキーを入力してください</span>';
  else el.innerHTML='<span class="key-ok">✓ 設定済み</span>';
}
function setEngine(e){
  sttEngine=e;sS('stteng',e);updateEngineUI();
  if(isOn){stop();start()}
}
function updateEngineUI(){
  document.getElementById('btnEngGroq').classList.toggle('active',sttEngine==='groq');
  document.getElementById('btnEngGem').classList.toggle('active',sttEngine==='gemini');
  document.getElementById('btnEng1step').classList.toggle('active',sttEngine==='1step');
  const descs={
    groq:'音声認識=Groq Whisper（無料）/ 翻訳=Gemini Flash',
    gemini:'音声認識・翻訳 すべてGemini Flash（2ステップ）',
    '1step':'音声→翻訳を1回のAPI呼出で完了（最速・APIコール半減）'
  };
  document.getElementById('engineDesc').textContent=descs[sttEngine]||'';
}
function setModel(m){
  geminiModel=m;sS('gmodel',m);updateModelUI();
}
function setTransMode(m){
  transMode=m;sS('tmode',m);
  document.getElementById('btnModeAuto').classList.toggle('active',m==='auto');
  document.getElementById('btnModeEnJa').classList.toggle('active',m==='en-ja');
  document.getElementById('btnModeJaEn').classList.toggle('active',m==='ja-en');
  document.getElementById('btnModeJaOnly').classList.toggle('active',m==='ja-only');
}
function getPair(detected){
  if(transMode==='en-ja') return {from:'en',to:'ja'};
  if(transMode==='ja-en') return {from:'ja',to:'en'};
  // auto
  return detected==='ja'?{from:'ja',to:'en'}:{from:'en',to:'ja'};
}
function updateModelUI(){
  ['btnM1','btnM2','btnM3'].forEach(id=>document.getElementById(id).classList.remove('active'));
  const info=MODEL_INFO[geminiModel];
  if(info){
    document.getElementById(info.btn).classList.add('active');
    document.getElementById('modelDesc').textContent=info.desc;
  }
}

// ══════ Init ══════
(function(){
  apiKey = sG('gk')||''; geminiKey = sG('gemk')||''; nameHints = sG('nh')||'';
  sttEngine = sG('stteng')||'groq';
  geminiModel = sG('gmodel')||'gemini-3-flash-preview';
  if(!MODEL_INFO[geminiModel]) geminiModel='gemini-3-flash-preview';
  sS('gmodel',geminiModel);
  transMode = sG('tmode')||'auto';
  document.getElementById('keyInput').value = apiKey;
  document.getElementById('gemKeyInput').value = geminiKey;
  document.getElementById('namesInput').value = nameHints;
  updateKeyUI(); updateGemKeyUI(); updateEngineUI(); updateModelUI();
  setTransMode(transMode);
})();

// ══════ Scroll — always keep bottom visible ══════
function scrollDown(){
  document.getElementById('scrollAnchor').scrollIntoView({behavior:'smooth',block:'end'});
}

// ══════ Time ══════
function timeStr(){const d=new Date();return d.getHours()+':'+String(d.getMinutes()).padStart(2,'0')}

// ══════ Source language from mode ══════
function getSrcLang(){
  if(transMode==='en-ja') return 'en';
  if(transMode==='ja-en'||transMode==='ja-only') return 'ja';
  return null; // auto
}

// ══════ Groq Whisper ══════
async function whisper(blob, prevContext){
  const form=new FormData();
  form.append('file',blob,'a.webm');
  form.append('model','whisper-large-v3-turbo');
  form.append('response_format','verbose_json');
  const srcLang=getSrcLang();
  if(srcLang) form.append('language',srcLang);
  // Build prompt: previous context + name hints
  let prompt='';
  if(prevContext) prompt+=prevContext.slice(-200)+' ';
  if(nameHints.trim()) prompt+='Meeting participants: '+nameHints.trim();
  if(prompt.trim()) form.append('prompt',prompt.trim());
  const r=await fetch('https://api.groq.com/openai/v1/audio/transcriptions',{
    method:'POST',headers:{'Authorization':'Bearer '+apiKey},body:form
  });
  if(!r.ok) throw new Error(r.status+' '+await r.text());
  return r.json();
}

// ══════ Gemini Audio Transcription ══════
async function geminiTranscribe(blob, prevContext){
  if(!geminiKey) throw new Error('No Gemini key');
  const base64=await new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=()=>res(r.result.split(',')[1]);
    r.onerror=()=>rej(new Error('Read failed'));
    r.readAsDataURL(blob);
  });
  const srcLang=getSrcLang();
  const langHint=srcLang?` The audio is in ${srcLang==='en'?'English':'Japanese'}.`:'';
  const namePrompt=nameHints.trim()?` Participant names: ${nameHints.trim()}`:'';
  const contextHint=prevContext?` Previous context: "${prevContext.slice(-200)}"`:'';
  const r=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${geminiModel}:generateContent?key=${geminiKey}`,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      contents:[{parts:[
        {inlineData:{mimeType:'audio/webm',data:base64}},
        {text:`Transcribe this audio exactly as spoken. Output ONLY the transcription text, nothing else. If silent, output nothing.${langHint}${namePrompt}${contextHint}`}
      ]}],
      generationConfig:{maxOutputTokens:500,temperature:0.1}
    })
  });
  if(!r.ok) throw new Error(r.status);
  const d=await r.json();
  const text=(d.candidates?.[0]?.content?.parts?.[0]?.text||'').trim();
  const lang=srcLang||(detectLang(text)==='ja'?'ja':'en');
  return {text,language:lang};
}

// ══════ Gemini 1-step: Audio → Transcription + Translation in one call ══════
async function gemini1step(blob){
  if(!geminiKey) throw new Error('No Gemini key');
  const base64=await new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=()=>res(r.result.split(',')[1]);
    r.onerror=()=>rej(new Error('Read failed'));
    r.readAsDataURL(blob);
  });
  const srcLang=getSrcLang();
  const fromLang=srcLang==='ja'?'Japanese':'English';
  const toLang=srcLang==='ja'?'English':'Japanese';
  const langHint=srcLang?`The audio is in ${fromLang}. `:'';
  const namePrompt=nameHints.trim()?`Speaker names: ${nameHints.trim()}. `:'';
  const prevCtx=src.mic.context.slice(-2).join(' ');
  const ctxHint=prevCtx?`Previous context: "${prevCtx.slice(-150)}". `:'';

  const r=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${geminiModel}:generateContent?key=${geminiKey}`,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      contents:[{parts:[
        {inlineData:{mimeType:'audio/webm',data:base64}},
        {text:`${langHint}${namePrompt}${ctxHint}Transcribe this audio and translate it to ${toLang}. Output exactly two lines:
ORIGINAL: (exact transcription)
TRANSLATION: (faithful full translation)
If silent, output nothing.`}
      ]}],
      generationConfig:{maxOutputTokens:1024,temperature:0.1}
    })
  });
  if(!r.ok) throw new Error(r.status);
  const d=await r.json();
  const raw=(d.candidates?.[0]?.content?.parts?.[0]?.text||'').trim();

  // Parse ORIGINAL and TRANSLATION lines
  const origMatch=raw.match(/ORIGINAL:\s*(.+)/i);
  const transMatch=raw.match(/TRANSLATION:\s*(.+)/i);
  if(origMatch&&transMatch){
    return {text:origMatch[1].trim(),translation:transMatch[1].trim(),language:srcLang||'en'};
  }
  // Fallback: treat entire response as translation
  return {text:raw,translation:raw,language:srcLang||'en'};
}

// ══════ Gemini Flash Translation ══════
async function llamaTranslate(text, fromLang, toLang, context){
  if(!geminiKey) throw new Error('No Gemini key');
  const fromName = fromLang==='en'?'English':'Japanese';
  const toName = toLang==='en'?'English':'Japanese';
  let prompt;
  if(context&&context.length>0){
    const ctx=context.join('\n');
    prompt=`You are a real-time meeting translator (${fromName} to ${toName}).

Previous context for reference:
${ctx}

Translate ALL of the following text faithfully. Do NOT summarize or omit anything. Use the context above only to understand pronouns and references. Do NOT translate the context. Output ONLY the translation.

${text}`;
  } else {
    prompt=`You are a real-time meeting translator. Translate the following ${fromName} to ${toName}. Translate ALL content faithfully. Do NOT summarize or omit anything. Output ONLY the translation.\n\n${text}`;
  }
  const r=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${geminiModel}:generateContent?key=${geminiKey}`,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      contents:[{parts:[{text:prompt}]}],
      generationConfig:{maxOutputTokens:1024,temperature:0.2}
    })
  });
  if(!r.ok) throw new Error(r.status);
  const d=await r.json();
  return (d.candidates?.[0]?.content?.parts?.[0]?.text||'').trim();
}

// ══════ Language detection ══════
function detectLang(t){
  const jp=(t.match(/[\u3040-\u309F\u30A0-\u30FF\u4E00-\u9FFF]/g)||[]).length;
  const en=(t.match(/[a-zA-Z]/g)||[]).length;
  return (jp+en===0)?'ja':(jp/(jp+en)>0.3?'ja':'en');
}


// ══════ Block: LIVEブロック蓄積 + リアルタイム翻訳更新 ══════
// テキストを溜めながら翻訳を毎チャンク更新。まとまったら確定。
const MIN_SEAL=80;
const MAX_SEAL=window.innerWidth<600?120:200;

function handleChunk(sType, text, pair, preTranslation){
  const s=src[sType];
  const ph=document.getElementById('feedEmpty');if(ph)ph.remove();

  // テキスト蓄積
  s.accText=(s.accText||'')+' '+text;
  s.accText=s.accText.trim();

  // LIVEブロックがなければ作成
  if(!s.el){
    s.el=document.createElement('div');
    s.el.className='block live';
    const icon=sType==='pc'?'🖥':'🎙';
    s.el.innerHTML=`
      <div class="block-head">
        <span class="block-src">${icon} ${sType==='pc'?'相手':'自分'}</span>
        <span class="block-live">LIVE</span>
        <span class="block-time">${timeStr()}</span>
      </div>
      <div class="block-ja">翻訳中…</div>
      <div class="block-en"></div>`;
    document.getElementById('feed').appendChild(s.el);
  }

  // 原文を即表示
  const enEl=s.el.querySelector('.block-en');
  if(transMode==='ja-only'){
    if(enEl) enEl.style.display='none';
    const jaEl=s.el.querySelector('.block-ja');
    if(jaEl) jaEl.textContent=s.accText;
  } else {
    if(enEl){enEl.style.display='';enEl.textContent=s.accText;}
  }
  scrollDown();

  // 確定判定（全モード共通）
  const hasEnd=/[.?!。？！]$/.test(s.accText.trim());
  const shouldSeal=(s.accText.length>=MIN_SEAL && hasEnd) || s.accText.length>=MAX_SEAL;

  if(shouldSeal){
    sealLive(sType,preTranslation);
    return;
  }

  // 未確定 → リアルタイム翻訳更新（翻訳モードのみ）
  if(transMode!=='ja-only'){
    if(preTranslation){
      // 1step: 翻訳済みテキストを蓄積して表示
      s.accJa=(s.accJa||'')+preTranslation;
      const jaEl=s.el.querySelector('.block-ja');
      if(jaEl) jaEl.textContent=s.accJa;
      scrollDown();
    } else {
      // 2step: Geminiに翻訳リクエスト
      s.transVer=(s.transVer||0)+1;
      const ver=s.transVer;
      const ctx=s.context.slice(-3);
      llamaTranslate(s.accText,pair.from,pair.to,ctx).then(t=>{
        if(ver!==s.transVer||!s.el) return;
        const jaEl=s.el.querySelector('.block-ja');
        if(jaEl) jaEl.textContent=t;
        scrollDown();
      }).catch(err=>console.error('Interim translate error:',err));
    }
  }

  const sealMs=transMode==='ja-only'?CHUNK_MS_FAST:CHUNK_MS;
  clearTimeout(s.sealTimer);
  s.sealTimer=setTimeout(()=>sealLive(sType), sealMs*2);
}

function sealLive(sType,preTranslation){
  const s=src[sType];
  if(!s.el||!s.accText?.trim()) return;

  s.el.classList.remove('live');
  const lb=s.el.querySelector('.block-live');if(lb)lb.remove();

  const text=s.accText.trim();
  const detected=detectLang(text);
  const pair=getPair(detected);

  const jaEl=s.el.querySelector('.block-ja');
  const ja=jaEl?jaEl.textContent:'';
  const idx=transcript.length;
  transcript.push({time:timeStr(),source:sType==='pc'?'相手':'自分',en:text,ja:ja});

  const sealedEl=s.el;
  if(transMode!=='ja-only'){
    if(sttEngine==='1step'&&(s.accJa||preTranslation)){
      const finalJa=(s.accJa||'')+(preTranslation||'');
      const jaEl2=sealedEl.querySelector('.block-ja');
      if(jaEl2) jaEl2.textContent=finalJa;
      if(transcript[idx]) transcript[idx].ja=finalJa;
    } else {
      const ctx=s.context.slice(-3);
      const doTranslate=(attempt)=>{
        llamaTranslate(text,pair.from,pair.to,ctx).then(t=>{
          const jaEl2=sealedEl.querySelector('.block-ja');
          if(jaEl2) jaEl2.textContent=t;
          if(transcript[idx]) transcript[idx].ja=t;
          scrollDown();
        }).catch(err=>{
          console.error('Translation failed (attempt '+attempt+'):',err);
          if(attempt<3) setTimeout(()=>doTranslate(attempt+1),2000);
        });
      };
      doTranslate(1);
    }
  }

  s.context.push(text);
  if(s.context.length>5) s.context.shift();

  s.el=null;
  s.accText='';
  s.accJa='';
  s.transVer=0;
  clearTimeout(s.sealTimer);
}

function flushPending(sType){
  sealLive(sType);
}

// ══════ Transcript Save / Load ══════
function saveTranscript(){
  if(transcript.length===0){showErr('保存するデータがありません');return}
  const data=transcript.map(e=>({time:e.time,source:e.source,en:e.en,ja:e.ja}));
  const json=JSON.stringify(data,null,2);
  const date=new Date();
  const fname=`transcript_${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}_${String(date.getHours()).padStart(2,'0')}${String(date.getMinutes()).padStart(2,'0')}.json`;
  const blob=new Blob([json],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=fname;a.click();
  URL.revokeObjectURL(url);
}

function loadTranscript(event){
  const file=event.target.files[0];
  if(!file) return;
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const data=JSON.parse(e.target.result);
      if(!Array.isArray(data)){showErr('無効なファイル形式です');return}
      transcript=data;

      // フィードに表示
      const feed=document.getElementById('feed');
      feed.innerHTML='';
      data.forEach(entry=>{
        const el=document.createElement('div');
        el.className='block';
        const icon=entry.source==='相手'?'🖥':'🎙';
        el.innerHTML=`
          <div class="block-head">
            <span class="block-src">${icon} ${entry.source}</span>
            <span class="block-time">${entry.time||''}</span>
          </div>
          <div class="block-ja">${escapeHtml(entry.ja||'')}</div>
          <div class="block-en">${escapeHtml(entry.en||'')}</div>`;
        feed.appendChild(el);
      });
      scrollDown();
      showErr(`✅ ${data.length}件のトランスクリプトを読み込みました。📋で要約できます。`);
    }catch(err){
      showErr('ファイルの読み込みに失敗しました: '+err.message);
    }
  };
  reader.readAsText(file);
  event.target.value=''; // 同じファイルを再読込可能に
}

// ══════ Word Export ══════
let lastSummary = '';

function exportWord(includeSummary){
  if(transcript.length===0){showErr('保存するデータがありません');return}

  const date=new Date();
  const dateStr=date.getFullYear()+'年'+(date.getMonth()+1)+'月'+date.getDate()+'日';
  const fileDate=date.getFullYear()+'-'+String(date.getMonth()+1).padStart(2,'0')+'-'+String(date.getDate()).padStart(2,'0');
  const timeS=String(date.getHours()).padStart(2,'0')+String(date.getMinutes()).padStart(2,'0');

  let body=`<h1 style="color:#333;border-bottom:2px solid #4f46e5;padding-bottom:8px;">Meeting Transcript</h1>`;
  body+=`<p style="color:#666;font-size:14px;">${dateStr}</p>`;

  // Summary section
  const summary = includeSummary ? lastSummary : '';
  if(summary){
    body+=`<h2 style="color:#4f46e5;margin-top:24px;">📋 要約</h2>`;
    body+=`<div style="background:#f0f0ff;padding:16px;border-radius:8px;border-left:4px solid #4f46e5;margin-bottom:24px;line-height:1.8;">${escapeHtml(summary).replace(/\n/g,'<br>')}</div>`;
  }

  body+=`<h2 style="color:#4f46e5;margin-top:24px;">📝 トランスクリプト</h2>`;

  transcript.forEach(e=>{
    const srcLabel=e.source==='相手'?'🖥 相手':'🎙 自分';
    body+=`<div style="margin-bottom:16px;padding:12px 16px;background:#fafafa;border-radius:8px;border-left:4px solid ${e.source==='相手'?'#818cf8':'#f472b6'};">`;
    body+=`<p style="margin:0 0 4px;font-size:11px;color:#888;"><b>${e.time}</b> — ${srcLabel}</p>`;
    body+=`<p style="margin:0 0 6px;font-size:15px;color:#111;line-height:1.7;"><b>${escapeHtml(e.ja||'')}</b></p>`;
    body+=`<p style="margin:0;font-size:12px;color:#555;line-height:1.5;">${escapeHtml(e.en)}</p>`;
    body+=`</div>`;
  });

  const html=`<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:w="urn:schemas-microsoft-com:office:word" xmlns="http://www.w3.org/TR/REC-html40">
<head><meta charset="utf-8"><style>body{font-family:'Yu Gothic','Noto Sans JP','Hiragino Sans',sans-serif;max-width:700px;margin:0 auto;padding:24px;}</style></head>
<body>${body}<p style="color:#aaa;font-size:10px;margin-top:32px;text-align:center;">Generated by Meeting Translator</p></body></html>`;

  const blob=new Blob(['\ufeff',html],{type:'application/msword'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download=`meeting_${fileDate}_${timeS}.doc`;
  a.click();
  URL.revokeObjectURL(url);
}

// ══════ Gemini Summary ══════
async function summarize(mode){
  if(transcript.length===0){showErr('要約するデータがありません');return}
  if(!geminiKey){showErr('⚙設定からGemini APIキーを入力してください');return}

  // Show modal & update tab state
  document.getElementById('summaryOverlay').classList.add('show');
  document.getElementById('summaryText').textContent='要約を生成中…';
  document.getElementById('btnSumAll').classList.toggle('active',mode==='all');
  document.getElementById('btnSumBlk').classList.toggle('active',mode==='blocks');

  // Build transcript text
  let text='';
  transcript.forEach(e=>{
    text+=`[${e.time} ${e.source}] ${e.en}\n→ ${e.ja||''}\n\n`;
  });

  const prompts={
    all:`以下は会議のトランスクリプトです。日本語で議事録として要約してください。

要約には以下を含めてください：
1. 会議の主要な議題
2. 重要な決定事項
3. アクションアイテム（誰が何をするか）
4. 次のステップ

トランスクリプト：
${text}`,

    blocks:`以下は会議のトランスクリプトです。各発言を「誰が何を言ったか」の形式で整理してください。

ルール：
1. フィラー（あー、えーと、um、uh、you know、basically、like等）を除去する
2. 口語・方言・スラングはビジネス調の標準語に直す。ただし話者本人の発言として自然な表現にする
   良い例：「やばくない？予算オーバーしちゃうよ」→「それは適切ではないと思います。予算をオーバーすると考えられます」
   悪い例：「やばくない？」→「当該事案に対する懸念が示された」（第三者の報告文になっている）
3. あくまで話者が自分で話しているトーンを保つ。議事録の地の文にしない
4. 言い直しや繰り返しは1つにまとめてよい
5. 意味のない相槌だけの発言（uh-huh、なるほど、right等）は省略してよい
6. 話者（自分/相手）と時刻は保持する

出力フォーマット：
[時刻] 話者：発言内容

トランスクリプト：
${text}`
  };

  try{
    const r=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${geminiModel}:generateContent?key=${geminiKey}`,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        contents:[{parts:[{text:prompts[mode]}]}],
        generationConfig:{maxOutputTokens:2000,temperature:0.2}
      })
    });
    if(!r.ok) throw new Error(r.status);
    const d=await r.json();
    const summary=d.candidates?.[0]?.content?.parts?.[0]?.text||'要約を生成できませんでした';
    lastSummary=summary;
    document.getElementById('summaryText').textContent=summary;
  }catch(err){
    document.getElementById('summaryText').textContent='⚠ 要約の生成に失敗しました: '+err.message;
  }
}

function openSummary(){
  if(transcript.length===0){showErr('要約するデータがありません');return}
  if(!geminiKey){showErr('⚙設定からGemini APIキーを入力してください');return}
  document.getElementById('summaryOverlay').classList.add('show');
  document.getElementById('summaryText').textContent='モードを選んで要約を生成してください';
}
function closeSummary(){document.getElementById('summaryOverlay').classList.remove('show')}

// ══════ Audio capture loop ══════
function startCapture(stream, sType){
  function doChunk(){
    if(!isOn) return;
    let mime='audio/webm';
    if(!MediaRecorder.isTypeSupported(mime)) mime='audio/webm;codecs=opus';
    if(!MediaRecorder.isTypeSupported(mime)) mime='';

    const rec=new MediaRecorder(stream, mime?{mimeType:mime}:{});
    const parts=[];
    rec.ondataavailable=e=>{if(e.data.size>0)parts.push(e.data)};
    rec.onstop=async()=>{
      if(!isOn){return}
      if(parts.length===0){doChunk();return}
      const blob=new Blob(parts,{type:mime||'audio/webm'});

      // Skip very small blobs (likely silence)
      if(blob.size<800){
        handleSilence(sType);
        doChunk();return;
      }

      try{
        let text, pair, preTranslation=null;

        if(sttEngine==='1step'){
          const result=await gemini1step(blob);
          if(!isOn) return; // 停止後のレスポンスは破棄
          text=(result.text||'').trim();
          if(!text||text.length<2){handleSilence(sType);doChunk();return}
          const detected=result.language==='ja'?'ja':'en';
          pair=getPair(detected);
          preTranslation=result.translation;
        } else {
          const prevCtx=src[sType].lastText||'';
          const result = sttEngine==='gemini' ? await geminiTranscribe(blob,prevCtx) : await whisper(blob,prevCtx);
          if(!isOn) return;

          // Whisper: no_speech_prob が高いセグメントを除去
          if(result.segments&&result.segments.length>0){
            const valid=result.segments.filter(seg=>(seg.no_speech_prob||0)<0.6);
            if(valid.length===0){handleSilence(sType);doChunk();return}
            text=valid.map(seg=>seg.text).join(' ').trim();
          } else {
            text=(result.text||'').trim();
          }

          const detected=result.language==='ja'||result.language==='japanese'?'ja':'en';
          pair=getPair(detected);
        }

        // ═══ 全モード共通ハルシネーション対策 ═══

        // 前回と同じテキストの繰り返し
        if(text&&src[sType].lastText&&text===src[sType].lastText){
          handleSilence(sType);
          doChunk();return;
        }

        // 音声が小さいのにテキストが長すぎる（ハルシネーションの兆候）
        const charsPerKB=text.length/(blob.size/1024);
        if(blob.size<2000&&text.length>80){
          console.warn('Hallucination suspected: tiny audio, long text',{blobSize:blob.size,textLen:text.length});
          handleSilence(sType);
          doChunk();return;
        }

        // テキストパターンフィルター
        const hallu=/^[\.\s…,，、。]+$/.test(text)
          || text.length<3
          || /thank(s| you)/i.test(text)
          || /subscribe/i.test(text)
          || /チャンネル登録/i.test(text)
          || /ご視聴/i.test(text)
          || /お疲れ様/i.test(text)
          || /よろしくお願い/i.test(text)
          || /ありがとうございました/i.test(text)
          || /please like/i.test(text)
          || /see you/i.test(text)
          || /bye/i.test(text.toLowerCase())
          || /^(music|applause|\[.*\]|\(.*\))$/i.test(text);
        if(!text||hallu){
          handleSilence(sType);
          doChunk();return;
        }

        // Save as context for next chunk
        src[sType].lastText=text;
        const s=src[sType];
        s.silentCount=0;

        // Detect language
        const detected=detectLang(text);
        if(!pair) pair=getPair(detected);

        // リアルタイム翻訳処理
        handleChunk(sType,text,pair,preTranslation);

      }catch(err){
        console.error('Error:',err);
        if(String(err).includes('401'))showErr('APIキーが無効です');
        else if(String(err).includes('429'))showErr('レート制限。少し待ってください');
      }
      doChunk();
    };
    rec.start();
    const chunkMs=transMode==='ja-only'?CHUNK_MS_FAST:CHUNK_MS;
    const t=setTimeout(()=>{if(rec.state==='recording')rec.stop()},chunkMs);
    if(sType==='mic')micTimer=t;else pcTimer=t;
  }
  doChunk();
}

function handleSilence(sType){
  const s=src[sType];
  s.silentCount++;
  if(s.silentCount>=SEAL_SILENCE){
    flushPending(sType);
  }
}

// ══════ Start / Stop ══════
function toggle(){isOn?stop():start()}

async function start(){
  if(sttEngine==='groq'&&!apiKey){showErr('⚙設定からGroq APIキーを入力してください');return}
  if((sttEngine==='gemini'||sttEngine==='1step')&&!geminiKey){showErr('⚙設定からGemini APIキーを入力してください');return}
  if(sttEngine==='groq'&&!geminiKey){showErr('⚙設定からGemini APIキーを入力してください');return}
  isOn=true;
  document.getElementById('recBtn').classList.add('on');
  document.getElementById('recIcon').textContent='⏹';
  document.getElementById('floatRec').classList.add('on');
  document.getElementById('floatRec').textContent='⏹';
  const st=document.getElementById('ctrlStatus');st.textContent='● 聞き取り中…';st.classList.add('on');
  hideErr();

  if(useMic){
    try{
      micStream=await navigator.mediaDevices.getUserMedia({audio:true});
      startCapture(micStream,'mic');
    }catch(e){showErr('マイクにアクセスできません')}
  }
  if(usePC){
    try{
      pcStream=await navigator.mediaDevices.getDisplayMedia({video:true,audio:true});
      pcStream.getVideoTracks().forEach(t=>t.stop());
      if(pcStream.getAudioTracks().length===0){
        showErr('「音声を共有」にチェックを入れてください');
      }else{
        startCapture(pcStream,'pc');
      }
    }catch(e){
      if(e.name!=='NotAllowedError')showErr('PC音声取得エラー');
      usePC=false;document.getElementById('btnPC').classList.remove('active');
    }
  }
}

function stop(){
  isOn=false;
  clearTimeout(micTimer);clearTimeout(pcTimer);
  flushPending('mic');flushPending('pc');
  if(micStream){micStream.getTracks().forEach(t=>t.stop());micStream=null}
  if(pcStream){pcStream.getTracks().forEach(t=>t.stop());pcStream=null}
  document.getElementById('recBtn').classList.remove('on');
  document.getElementById('recIcon').textContent='🎤';
  document.getElementById('floatRec').classList.remove('on');
  document.getElementById('floatRec').textContent='🎤';
  const st=document.getElementById('ctrlStatus');st.textContent='タップして開始';st.classList.remove('on');
}

function clearAll(){
  if(transcript.length>0&&!confirm('トランスクリプトをクリアします。保存しましたか？'))return;
  flushPending('mic');flushPending('pc');
  transcript=[];
  src.mic.context=[];src.pc.context=[];
  src.mic.accText='';src.pc.accText='';
  src.mic.accJa='';src.pc.accJa='';
  document.getElementById('feed').innerHTML='<div class="feed-empty" id="feedEmpty">🎙 開始すると翻訳がここに表示されます</div>';
}

function showErr(m){const e=document.getElementById('errBox');e.textContent=m;e.classList.add('show');setTimeout(()=>e.classList.remove('show'),6000)}
function hideErr(){document.getElementById('errBox').classList.remove('show')}
function escapeHtml(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
